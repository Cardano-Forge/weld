name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, check & test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm ci has a known bug with optional dependencies in workspaces
      # (https://github.com/npm/cli/issues/4828) that causes rollup's
      # platform-specific binary (@rollup/rollup-linux-x64-gnu) to be
      # missing. The fix is to run npm install after npm ci.
      - name: Install dependencies
        run: |
          npm ci
          npm install

      # Use the official Biome action — avoids the platform binary resolution
      # issue that occurs when running npx biome directly in workspace CI.
      # Read-only: never auto-fixes, annotates GitHub with errors inline.
      - name: Lint (read-only)
        uses: biomejs/setup-biome@v2
        with:
          version: latest
      - run: |
          biome ci --reporter=github core &
          biome ci --reporter=github plugins/hodei &
          wait

      # turbo resolves ^build dependencies automatically before running
      # check and test in each package — no manual build step needed.
      - name: Type check
        run: |
          npx turbo run check \
            --filter=@ada-anvil/weld \
            --filter=@ada-anvil/weld-plugin-hodei

      - name: Test
        run: |
          npx turbo run test \
            --filter=@ada-anvil/weld \
            --filter=@ada-anvil/weld-plugin-hodei
