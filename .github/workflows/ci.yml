name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, check & test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm ci has a known bug with optional dependencies in workspaces
      # (https://github.com/npm/cli/issues/4828) that causes rollup's
      # platform-specific binary to be missing. Deleting node_modules and
      # using npm install (not npm ci) is the reliable fix.
      - name: Install dependencies
        run: |
          npm install

      # Use the official Biome action for the CLI binary.
      # Run from inside each package directory so Biome uses that package's
      # own biome.json — avoids the "nested root configuration" error that
      # occurs when running from the repo root with Biome v2.
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Lint (read-only)
        run: |
          (cd core && biome ci --reporter=github .) &
          (cd plugins/hodei && biome ci --reporter=github .) &
          wait

      # turbo resolves ^build dependencies automatically before running check
      - name: Type check
        run: |
          npx turbo run check \
            --filter=@ada-anvil/weld \
            --filter=@ada-anvil/weld-plugin-hodei

      - name: Test
        run: |
          npx turbo run test \
            --filter=@ada-anvil/weld \
            --filter=@ada-anvil/weld-plugin-hodei
