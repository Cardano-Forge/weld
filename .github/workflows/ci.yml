name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, check & test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Lint (read-only)
        run: biome ci --reporter=github .

      - name: Type check
        run: |
          npx turbo run check \
            --filter=@ada-anvil/weld \
            --filter=@ada-anvil/weld-plugin-hodei

      - name: Test
        run: |
          npx turbo run test \
            --filter=@ada-anvil/weld \
            --filter=@ada-anvil/weld-plugin-hodei
