name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # push version bump commits & tags
      pull-requests: write # open/update the Version Packages PR
      id-token: write # OIDC token for npm trusted publishing

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/

      - run: npm ci

      - name: Check & test
        run: |
          npx turbo run check test \
            --filter=@ada-anvil/weld \
            --filter=@ada-anvil/weld-plugin-hodei

      # -----------------------------------------------------------------------
      # Version packages and optionally open a PR
      # -----------------------------------------------------------------------
      - name: Version or publish
        uses: changesets/action@v1
        with:
          version: npx changeset version
          publish: npm run release
          commit: "chore: version packages"
          title: "chore: version packages"
          createGithubReleases: true
        env:
          # Use bot token to bypass GITHUB_TOKEN PR restrictions
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          # Default OIDC setup for npm publishing
          NPM_CONFIG_PROVENANCE: true
